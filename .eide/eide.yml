      defineList:
        - USE_STDPERIPH_DRIVER
      incList:
        - .
        - ../CORE
        - ../STM32F10x_FWLib/inc
        - ../SYSTEM/delay
        - ../SYSTEM/sys
        - ../SYSTEM/usart
        - ../HARDWARE/DS18B20
